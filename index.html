<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#24120d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="猪小弟气球保卫战">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>猪小弟气球保卫战</title>
  <style>
    :root {
      color-scheme: dark;
      --cream: #fff4bf;
      --ink: #24120d;
      --red: #ed3f32;
      --gold: #ffc247;
      --cyan: #23b7c7;
      --green: #20a66b;
      --panel: rgba(36, 18, 13, .78);
      --line: rgba(255, 238, 175, .58);
      font-family: ui-rounded, "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 12%, rgba(255, 194, 71, .28), transparent 28%),
        radial-gradient(circle at 83% 22%, rgba(35, 183, 199, .24), transparent 24%),
        linear-gradient(145deg, #6a1719 0%, #1c5f78 48%, #1c2b32 100%);
      color: var(--cream);
    }

    button {
      appearance: none;
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .cabinet {
      position: relative;
      width: min(100vw, 540px);
      height: min(100dvh, 960px);
      aspect-ratio: 9 / 16;
      max-height: 100dvh;
      overflow: hidden;
      background: #25130e;
      box-shadow: 0 28px 90px rgba(0, 0, 0, .48);
      isolation: isolate;
    }

    .cabinet::before {
      content: "";
      position: absolute;
      inset: 8px;
      z-index: 5;
      border: 2px solid var(--line);
      border-radius: 8px;
      pointer-events: none;
      box-shadow: inset 0 0 0 2px rgba(237, 63, 50, .26);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #26130e;
      touch-action: none;
    }

    .hud {
      position: absolute;
      z-index: 8;
      top: calc(env(safe-area-inset-top, 0px) + 12px);
      left: 14px;
      right: 14px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      gap: 8px;
      pointer-events: none;
    }

    .badge {
      padding: 8px 10px;
      border: 2px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      text-shadow: 0 2px 0 rgba(0,0,0,.28);
      box-shadow: 0 8px 22px rgba(0,0,0,.26);
      backdrop-filter: blur(8px);
    }

    .brand {
      min-width: 0;
      font-weight: 950;
      line-height: 1;
    }

    .brand span {
      display: block;
      margin-top: 4px;
      color: rgba(255, 244, 191, .72);
      font-size: 11px;
      font-weight: 800;
    }

    .score {
      min-width: 96px;
      text-align: center;
      font-weight: 950;
    }

    .score span {
      display: block;
      color: var(--gold);
      font-size: 25px;
      line-height: 1;
    }

    .lives {
      justify-self: end;
      min-width: 96px;
      color: #ffdb67;
      text-align: right;
      font-weight: 950;
    }

    .controls {
      position: absolute;
      z-index: 9;
      left: 0;
      right: 0;
      bottom: env(safe-area-inset-bottom, 0px);
      display: flex;
      justify-content: space-between;
      align-items: end;
      pointer-events: none;
      user-select: none;
    }

    .joystick {
      position: relative;
      width: 230px;
      height: 270px;
      pointer-events: auto;
      touch-action: none;
      display: grid;
      place-items: end center;
      padding-bottom: 34px;
    }

    .stick-base {
      position: relative;
      width: 86px;
      height: 86px;
      border: 2px solid rgba(255, 238, 175, .62);
      border-radius: 50%;
      background: rgba(36, 18, 13, .38);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .24), inset 0 0 0 2px rgba(255, 91, 64, .14);
      backdrop-filter: blur(8px);
    }

    .stick-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255, 238, 175, .82);
      border-radius: 50%;
      background: rgba(36, 18, 13, .78);
      color: var(--cream);
      font-size: 18px;
      font-weight: 950;
      transform: translate(-50%, -50%);
      transition: transform .08s linear;
    }

    .joystick.is-up .stick-knob { transform: translate(-50%, -86%); }
    .joystick.is-down .stick-knob { transform: translate(-50%, -14%); }

    .pad {
      display: grid;
      gap: 0;
      pointer-events: auto;
    }

    .round-btn {
      position: relative;
      width: 104px;
      height: 82px;
      display: grid;
      place-items: center;
      border: 0;
      border-radius: 26px;
      background: transparent;
      color: var(--cream);
      font-size: 22px;
      font-weight: 950;
      touch-action: manipulation;
    }

    .round-btn::before {
      content: "";
      position: absolute;
      width: 56px;
      height: 56px;
      border: 2px solid rgba(255, 238, 175, .76);
      border-radius: 50%;
      background: rgba(36, 18, 13, .72);
      box-shadow: 0 10px 24px rgba(0, 0, 0, .28), inset 0 0 0 2px rgba(255, 91, 64, .2);
      backdrop-filter: blur(8px);
    }

    .round-btn span {
      position: relative;
      z-index: 1;
    }

    .shoot {
      width: 230px;
      height: 230px;
      border-color: rgba(255, 194, 71, .92);
      color: #ffd56b;
      font-size: 16px;
      pointer-events: auto;
      touch-action: none;
    }

    .shoot::before {
      width: 72px;
      height: 72px;
      border-color: rgba(255, 194, 71, .92);
    }

    .round-btn:active {
      transform: translateY(1px) scale(.98);
    }

    .round-btn:active::before {
      background: rgba(205, 50, 40, .78);
    }

    .overlay {
      position: absolute;
      z-index: 10;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 26px;
      pointer-events: none;
    }

    .card {
      width: min(100%, 390px);
      display: none;
      padding: 20px 18px;
      border: 2px solid rgba(255, 238, 175, .68);
      border-radius: 8px;
      background: rgba(36, 18, 13, .9);
      text-align: center;
      box-shadow: 0 24px 66px rgba(0, 0, 0, .48), inset 0 0 0 2px rgba(237, 63, 50, .22);
      backdrop-filter: blur(10px);
    }

    .is-ready .ready,
    .is-paused .paused,
    .is-over .over { display: block; }

    .is-ready .ready { display: none; }

    .splash {
      position: absolute;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 40px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 255, 255, .94), rgba(255, 243, 198, .92) 34%, rgba(255, 194, 71, .92) 74%),
        linear-gradient(180deg, #fff8d7, #ffd95f);
      transition: opacity .35s ease, visibility .35s ease;
    }

    .splash img {
      width: min(78%, 390px);
      height: auto;
      display: block;
      filter: drop-shadow(0 18px 22px rgba(116, 50, 18, .22));
      animation: logo-pop .72s cubic-bezier(.2, 1.4, .28, 1) both;
    }

    .splash-powered {
      margin: 0 0 12px;
      color: rgba(92, 41, 18, .76);
      font-size: 14px;
      font-weight: 950;
      letter-spacing: .08em;
      text-transform: uppercase;
      text-shadow: 0 1px 0 rgba(255,255,255,.55);
    }

    .splash.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    @keyframes logo-pop {
      0% { transform: scale(.72); opacity: 0; }
      72% { transform: scale(1.04); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .card h1,
    .card h2 {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 30px;
      line-height: 1.08;
    }

    .card p {
      margin: 7px 0 0;
      color: rgba(255, 244, 191, .84);
      font-size: 15px;
      line-height: 1.55;
    }

    .primary {
      min-width: 152px;
      margin-top: 16px;
      padding: 11px 18px;
      border: 2px solid rgba(255, 238, 175, .72);
      border-radius: 8px;
      background: linear-gradient(180deg, #ffbf35, #e94b35);
      color: #fff8d7;
      font-weight: 950;
      text-shadow: 0 2px 0 rgba(99, 20, 11, .36);
      pointer-events: auto;
      box-shadow: 0 10px 24px rgba(0,0,0,.32);
    }

    @media (hover: hover) and (pointer: fine) {
      .controls { opacity: .28; }
      .controls:hover { opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="cabinet is-ready" id="cabinet">
    <canvas id="game" width="540" height="960" aria-label="猪小弟气球保卫战"></canvas>
    <section class="splash" id="splash" aria-label="卡米猫猫">
      <div>
        <p class="splash-powered">powered by</p>
        <img src="assets/pooyan-piglet/kami-maomao-logo.png" alt="">
      </div>
    </section>
    <section class="hud">
      <div class="badge brand">猪小弟<span>气球保卫战</span></div>
      <div class="badge score">分数<span id="score">0</span></div>
      <div class="badge lives" id="lives">午餐 x 3</div>
    </section>
    <section class="controls" aria-label="触控按钮">
      <div class="joystick" id="joystick" aria-label="移动摇杆">
        <div class="stick-base">
          <div class="stick-knob" id="stickKnob">↕</div>
        </div>
      </div>
      <button class="round-btn shoot" id="shoot" aria-label="射箭"><span>射箭</span></button>
    </section>
    <section class="overlay" id="overlay">
      <div class="card ready">
        <h1>猪小弟气球保卫战</h1>
        <p>移动篮筐，对准气球狼仔射箭。别让它们偷走你的野餐篮。</p>
        <p>键盘：↑ ↓ 移动，空格射箭。</p>
        <button class="primary" data-start>开张护食</button>
      </div>
      <div class="card paused">
        <h2>暂停中</h2>
        <p>猪小弟正在检查蝴蝶结有没有歪。</p>
        <button class="primary" data-start>继续</button>
      </div>
      <div class="card over">
        <h2>野餐告急</h2>
        <p id="finalText">最终得分 0</p>
        <button class="primary" data-start>再守一轮</button>
      </div>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const cabinet = document.getElementById("cabinet");
    const splash = document.getElementById("splash");
    const scoreEl = document.getElementById("score");
    const livesEl = document.getElementById("lives");
    const finalText = document.getElementById("finalText");

    const W = 540;
    const H = 960;
    const ground = 820;
    const playTop = 154;
    const playBottom = 790;
    const liftX = 62;
    const basketDraw = { x: -42, y: -58, w: 112, h: 112 };
    const enemyDraw = { x: -38, y: -38, w: 76, h: 76 };
    const arrowDraw = { x: -40, y: -10, w: 86, h: 21 };
    const maxArrows = 2;
    const arrowGravity = 420;
    const arrowSpeedX = 500;
    const arrowLift = -110;
    const keys = { up: false, down: false, shoot: false };

    let dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    let scale = 1;
    let viewX = 0;
    let viewY = 0;

    function loadImage(src) {
      const img = new Image();
      const asset = { img, ready: false };
      img.onload = () => {
        asset.ready = true;
      };
      img.src = src;
      return asset;
    }

    const bgAsset = loadImage("assets/pooyan-piglet/background.png");
    const underwaterBgAsset = loadImage("assets/pooyan-piglet/underwater-background.png");
    const spriteAsset = loadImage("assets/pooyan-piglet/sprites.png");
    const underwaterEnemyAsset = loadImage("assets/pooyan-piglet/underwater-enemies.png");
    const atlas = {
      basket: { x: 0, y: 0, w: 320, h: 320 },
      arrow: { x: 320, y: 0, w: 320, h: 320 },
      lunch: { x: 640, y: 0, w: 320, h: 320 },
      star: { x: 960, y: 0, w: 320, h: 320 },
      happyDog: { x: 0, y: 640, w: 320, h: 320 },
      bat: { x: 320, y: 640, w: 320, h: 320 },
      cat: { x: 640, y: 640, w: 320, h: 320 },
      turtle: { x: 960, y: 640, w: 320, h: 320 },
      underwater: {
        fish: { x: 0, y: 0, w: 320, h: 320 },
        crab: { x: 320, y: 0, w: 320, h: 320 },
        puffer: { x: 640, y: 0, w: 320, h: 320 },
        octopus: { x: 0, y: 320, w: 320, h: 320 },
        seahorse: { x: 320, y: 320, w: 320, h: 320 },
        shell: { x: 640, y: 320, w: 320, h: 320 }
      },
      wolves: [
        { x: 0, y: 320, w: 320, h: 320 },
        { x: 320, y: 320, w: 320, h: 320 },
        { x: 640, y: 320, w: 320, h: 320 },
        { x: 960, y: 320, w: 320, h: 320 }
      ]
    };

    let splashVisible = true;
    let splashTimer = window.setTimeout(hideSplash, 1650);

    const state = {
      mode: "ready",
      world: "sky",
      last: 0,
      score: 0,
      lives: 3,
      wave: 1,
      waveDone: 0,
      waveTarget: 9,
      waveBreak: 1.1,
      waveText: 1.35,
      spawn: .7,
      shootCd: 0,
      shake: 0,
      flash: 0,
      basket: { y: 472, vy: 0, mood: 0 },
      arrows: [],
      wolves: [],
      lunchDrops: [],
      pops: [],
      clouds: []
    };

    function fit() {
      const rect = cabinet.getBoundingClientRect();
      dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
      canvas.width = Math.floor(rect.width * dpr);
      canvas.height = Math.floor(rect.height * dpr);
      scale = Math.min(canvas.width / W, canvas.height / H);
      viewX = (canvas.width - W * scale) * .5;
      viewY = (canvas.height - H * scale) * .5;
    }

    function hideSplash() {
      if (!splashVisible) return;
      splashVisible = false;
      window.clearTimeout(splashTimer);
      splash.classList.add("is-hidden");
    }

    function reset() {
      state.mode = "play";
      state.last = performance.now();
      state.score = 0;
      state.lives = 3;
      state.world = "sky";
      state.wave = 1;
      state.waveDone = 0;
      state.waveTarget = 9;
      state.waveBreak = 1.1;
      state.waveText = 1.35;
      state.spawn = .45;
      state.shootCd = 0;
      state.shake = 0;
      state.flash = 0;
      state.basket.y = 472;
      state.basket.vy = 0;
      state.arrows = [];
      state.wolves = [];
      state.lunchDrops = [];
      state.pops = [];
      state.clouds = Array.from({ length: 9 }, (_, i) => ({
        x: Math.random() * W,
        y: 95 + Math.random() * 360,
        s: .72 + Math.random() * .75,
        v: 9 + Math.random() * 16,
        p: i * 1.7
      }));
      syncHud();
      setMode("play");
    }

    function setMode(mode) {
      state.mode = mode;
      cabinet.classList.toggle("is-ready", mode === "ready");
      cabinet.classList.toggle("is-paused", mode === "paused");
      cabinet.classList.toggle("is-over", mode === "over");
      if (mode === "over") finalText.textContent = `最终得分 ${state.score}`;
    }

    function syncHud() {
      scoreEl.textContent = state.score;
      livesEl.textContent = `午餐 x ${state.lives}`;
    }

    function shoot() {
      if (state.mode === "ready" || state.mode === "over") {
        reset();
        return;
      }
      if (state.mode !== "play" || state.shootCd > 0 || state.arrows.length >= maxArrows) return;
      state.shootCd = .18;
      state.basket.mood = .15;
      state.arrows.push({
        x: liftX + 68,
        y: state.basket.y - 4,
        vx: arrowSpeedX,
        vy: arrowLift + state.basket.vy * .04,
        angle: -.18,
        wobble: Math.random() * Math.PI * 2
      });
      addPop(liftX + 82, state.basket.y - 4, "#ffffff", 4);
    }

    function spawnWolf() {
      if (state.waveDone >= state.waveTarget || state.waveBreak > 0) return;
      if (state.world === "underwater") {
        spawnUnderwaterEnemy();
        return;
      }
      const columns = [248, 314, 380, 446, 502];
      const direction = state.wave === 2 ? -1 : 1;
      const startY = direction > 0 ? playTop - 46 : playBottom + 46;
      const openColumns = columns.filter((column) => !state.wolves.some((wolf) => !wolf.hit && !wolf.underwater && Math.abs(wolf.baseX - column) < 12 && Math.abs(wolf.y - startY) < 126));
      const lanePool = openColumns.length ? openColumns : columns;
      const x = lanePool[Math.floor(Math.random() * lanePool.length)];
      const roll = Math.random();
      let kind = "wolf";
      if (state.wave === 1 && roll < .12) kind = "happyDog";
      if (state.wave === 2) {
        if (roll < .1) kind = "turtle";
        else if (roll < .27) kind = "bat";
        else if (roll < .44) kind = "cat";
        else if (roll < .58) kind = "happyDog";
      }
      const speed = 32 + (state.wave - 1) * 4 + (kind === "cat" ? 3 : kind === "bat" ? 2 : 0);
      state.wolves.push({
        x,
        y: startY,
        baseX: x,
        baseY: startY,
        vx: 0,
        vy: speed * direction,
        balloon: 18,
        bob: Math.random() * Math.PI * 2,
        phase: Math.random() * Math.PI * 2,
        amp: kind === "bat" ? 10 : kind === "cat" ? 8 : kind === "turtle" ? 5 : 6,
        color: ["#ff4b43", "#22bfd1", "#ffd447", "#66d85f"][Math.floor(Math.random() * 4)],
        hit: false,
        hp: kind === "turtle" ? 2 : state.wave === 2 && kind === "wolf" && Math.random() < .22 ? 2 : 1,
        bite: 0,
        fast: false,
        kind,
        direction,
        sprite: Math.floor(Math.random() * 4)
      });
      state.spawn = (state.wave === 1 ? .84 : .72) + Math.random() * .28;
    }

    function spawnUnderwaterEnemy() {
      const lanes = [190, 270, 350, 430, 510, 590, 670, 740];
      const roll = Math.random();
      let kind = "fish";
      if (roll > .78) kind = "puffer";
      else if (roll > .58) kind = "crab";
      else if (roll > .38) kind = "octopus";
      else if (roll > .2) kind = "seahorse";
      const y = lanes[Math.floor(Math.random() * lanes.length)] + (Math.random() - .5) * 18;
      const puffer = kind === "puffer";
      const crab = kind === "crab";
      state.wolves.push({
        x: W + 48,
        y,
        baseX: W + 48,
        baseY: y,
        vx: puffer ? 44 : crab ? 48 : kind === "seahorse" ? 56 : 52,
        vy: 0,
        balloon: puffer ? 30 : 24,
        bob: Math.random() * Math.PI * 2,
        phase: Math.random() * Math.PI * 2,
        amp: kind === "fish" ? 24 : kind === "octopus" ? 28 : kind === "seahorse" ? 20 : crab ? 16 : 12,
        color: "#78e7ff",
        hit: false,
        hp: puffer ? 2 : 1,
        bite: 0,
        fast: false,
        kind,
        underwater: true
      });
      state.spawn = Math.max(.56, .9 - state.wave * .025) + Math.random() * .28;
    }

    function enemyTarget(enemy) {
      if (!enemy.underwater) return { x: enemy.x, y: enemy.y - 21, r: 19 };
      const targets = {
        fish: { x: 0, y: 0, r: 30 },
        crab: { x: 0, y: -24, r: 24 },
        puffer: { x: 0, y: 0, r: 30 },
        octopus: { x: 0, y: -20, r: 25 },
        seahorse: { x: 18, y: 3, r: 16 }
      };
      const target = targets[enemy.kind] || targets.fish;
      return { x: enemy.x + target.x, y: enemy.y + target.y, r: target.r };
    }

    function addPop(x, y, color, count = 10) {
      for (let i = 0; i < count; i += 1) {
        state.pops.push({
          x,
          y,
          vx: (Math.random() - .5) * 220,
          vy: -70 - Math.random() * 170,
          life: .38 + Math.random() * .34,
          age: 0,
          size: 9 + Math.random() * 18,
          color
        });
      }
    }

    function hitWolf(wolf) {
      if (wolf.hit) return;
      wolf.hp -= 1;
      if (wolf.hp > 0) {
        wolf.flash = .18;
        wolf.vy *= .72;
        wolf.vx *= .84;
        const target = enemyTarget(wolf);
        addPop(target.x, target.y, "#ffffff", 6);
        return;
      }
      wolf.hit = true;
      state.waveDone += 1;
      state.score += wolf.underwater ? (wolf.kind === "puffer" ? 70 : wolf.kind === "crab" ? 55 : 45) : wolf.kind === "turtle" ? 75 : wolf.kind === "bat" ? 60 : wolf.kind === "cat" ? 50 : wolf.kind === "happyDog" ? 55 : (wolf.fast ? 35 : 20);
      const target = enemyTarget(wolf);
      addPop(target.x, target.y, wolf.color, wolf.underwater ? 20 : 16);
      addPop(wolf.x + 4, wolf.y + 12, "#ffffff", 8);
      syncHud();
    }

    function addLunchDrop(x = 88, y = 742) {
      state.lunchDrops.push({
        x,
        y,
        vx: 90 + Math.random() * 130,
        vy: -260 - Math.random() * 130,
        rot: (Math.random() - .5) * .8,
        spin: (Math.random() - .5) * 6,
        age: 0,
        life: 1.45,
        size: 42 + Math.random() * 16
      });
    }

    function loseLunch(wolf) {
      if (wolf.bite > 0) return;
      wolf.bite = .4;
      wolf.hit = true;
      state.waveDone += 1;
      state.lives -= 1;
      state.shake = .3;
      state.flash = .24;
      addLunchDrop(78, ground - 72);
      addLunchDrop(106, ground - 82);
      addPop(92, ground - 60, "#ff4b43", 18);
      syncHud();
      if (state.lives <= 0) setMode("over");
    }

    function beginNextWave() {
      state.wave += 1;
      state.waveDone = 0;
      state.waveTarget = state.wave === 2 ? 10 : Math.min(16, 8 + state.wave);
      state.waveBreak = 1.25;
      state.waveText = 1.35;
      state.spawn = .55;
      state.world = state.wave >= 3 ? "underwater" : "sky";
      state.arrows = [];
      state.score += 50 + state.wave * 10;
      syncHud();
    }

    function update(dt) {
      const b = state.basket;
      const dir = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);
      const targetVy = dir * 330;
      b.vy += (targetVy - b.vy) * Math.min(1, dt * 16);
      b.y += b.vy * dt;
      b.y = Math.max(playTop, Math.min(playBottom, b.y));
      b.mood = Math.max(0, b.mood - dt);

      if (keys.shoot) shoot();
      state.shootCd = Math.max(0, state.shootCd - dt);
      state.waveText = Math.max(0, state.waveText - dt);
      if (state.waveBreak > 0) {
        state.waveBreak = Math.max(0, state.waveBreak - dt);
      } else {
        state.spawn -= dt;
        if (state.spawn <= 0) spawnWolf();
      }

      for (const cloud of state.clouds) {
        cloud.x -= cloud.v * dt;
        cloud.p += dt;
        if (cloud.x < -130) {
          cloud.x = W + 120;
          cloud.y = 95 + Math.random() * 360;
        }
      }

      for (const arrow of state.arrows) {
        arrow.x += arrow.vx * dt;
        arrow.y += arrow.vy * dt;
        arrow.vy += arrowGravity * dt;
        arrow.angle = Math.atan2(arrow.vy, arrow.vx);
        arrow.wobble += dt * 9;
      }

      for (const wolf of state.wolves) {
        wolf.bob += dt * 4.5;
        wolf.flash = Math.max(0, (wolf.flash || 0) - dt);
        if (wolf.underwater) {
          wolf.x -= wolf.vx * dt;
          wolf.phase += dt * (wolf.kind === "fish" ? 3.8 : wolf.kind === "octopus" ? 3.2 : 2.8);
          wolf.y = wolf.baseY + Math.sin(wolf.phase) * wolf.amp;
        } else {
          wolf.baseY += wolf.vy * dt;
          wolf.y = wolf.baseY;
          wolf.phase += dt * (wolf.kind === "bat" ? 3.6 : 2.6);
          wolf.x = wolf.baseX + Math.sin(wolf.phase) * wolf.amp;
        }
        const escaped = wolf.underwater ? wolf.x < 118 : wolf.direction > 0 ? wolf.y > playBottom + 38 : wolf.y < playTop - 38;
        if (!wolf.hit && escaped) loseLunch(wolf);
      }

      for (const arrow of state.arrows) {
        for (const wolf of state.wolves) {
          if (wolf.hit) continue;
          const target = enemyTarget(wolf);
          if (Math.hypot(arrow.x - target.x, arrow.y - target.y) < target.r + 8) {
            arrow.x = W + 999;
            hitWolf(wolf);
          }
        }
      }

      if (state.mode === "play" && state.waveDone >= state.waveTarget && state.wolves.every((wolf) => wolf.hit)) {
        beginNextWave();
      }

      for (const pop of state.pops) {
        pop.age += dt;
        pop.x += pop.vx * dt;
        pop.y += pop.vy * dt;
        pop.vy += 460 * dt;
      }

      for (const lunch of state.lunchDrops) {
        lunch.age += dt;
        lunch.x += lunch.vx * dt;
        lunch.y += lunch.vy * dt;
        lunch.vy += 720 * dt;
        lunch.rot += lunch.spin * dt;
        if (lunch.y > ground - 28) {
          lunch.y = ground - 28;
          lunch.vy *= -.36;
          lunch.vx *= .78;
        }
      }

      state.arrows = state.arrows.filter((arrow) => arrow.x < W + 80 && arrow.y < H + 80);
      state.wolves = state.wolves.filter((wolf) => wolf.x > -90 && (!wolf.hit || wolf.bob < 99));
      for (const wolf of state.wolves) if (wolf.hit) wolf.bob = 99;
      state.lunchDrops = state.lunchDrops.filter((lunch) => lunch.age < lunch.life);
      state.pops = state.pops.filter((pop) => pop.age < pop.life);
      state.shake = Math.max(0, state.shake - dt);
      state.flash = Math.max(0, state.flash - dt);
    }

    function roundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    function inkStroke(width = 5) {
      ctx.lineWidth = width;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.strokeStyle = "#24120d";
      ctx.stroke();
    }

    function drawBackground(t) {
      if (state.world === "underwater" && underwaterBgAsset.ready) {
        ctx.drawImage(underwaterBgAsset.img, 0, 0, W, H);
        ctx.fillStyle = "rgba(80, 232, 255, .035)";
        ctx.fillRect(0, 0, W, H);
        return;
      }
      if (bgAsset.ready) {
        ctx.drawImage(bgAsset.img, 0, 0, W, H);
        return;
      }
      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#2ab9d1");
      sky.addColorStop(.42, "#ffcf51");
      sky.addColorStop(.72, "#f05a38");
      sky.addColorStop(1, "#542019");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      ctx.fillStyle = "rgba(255, 244, 191, .28)";
      for (let i = 0; i < 18; i += 1) {
        ctx.beginPath();
        ctx.arc((i * 74 + t * .015) % 620 - 40, 78 + (i % 5) * 126, 2.2, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const cloud of state.clouds) drawCloud(cloud.x, cloud.y + Math.sin(cloud.p) * 5, cloud.s);

      ctx.fillStyle = "#147052";
      ctx.beginPath();
      ctx.moveTo(0, ground);
      ctx.bezierCurveTo(130, 760, 240, 850, 540, 790);
      ctx.lineTo(540, 960);
      ctx.lineTo(0, 960);
      ctx.closePath();
      ctx.fill();
      inkStroke(5);

      ctx.fillStyle = "#ffcf51";
      for (let x = 18; x < W; x += 42) {
        ctx.beginPath();
        ctx.moveTo(x, ground + 18);
        ctx.quadraticCurveTo(x + 14, ground - 8, x + 28, ground + 18);
        ctx.fill();
      }

      ctx.fillStyle = "#5b2a18";
      roundedRect(22, 152, 58, 628, 8);
      ctx.fill();
      inkStroke(5);
      ctx.fillStyle = "#ffc247";
      for (let y = 188; y < 754; y += 72) {
        roundedRect(31, y, 40, 14, 7);
        ctx.fill();
        inkStroke(3);
      }
    }

    function drawCloud(x, y, s) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(s, s);
      ctx.fillStyle = "rgba(255, 244, 191, .85)";
      ctx.beginPath();
      ctx.arc(0, 15, 23, Math.PI, 0);
      ctx.arc(28, 3, 25, Math.PI, 0);
      ctx.arc(60, 12, 20, Math.PI, 0);
      ctx.lineTo(82, 34);
      ctx.lineTo(-20, 34);
      ctx.closePath();
      ctx.fill();
      inkStroke(3);
      ctx.restore();
    }

    function drawBasket(t) {
      const y = state.basket.y;
      if (spriteAsset.ready) {
        ctx.save();
        ctx.translate(liftX, y);
        ctx.rotate(Math.sin(t * .006) * .025);
        const part = atlas.basket;
        ctx.drawImage(spriteAsset.img, part.x, part.y, part.w, part.h, basketDraw.x, basketDraw.y, basketDraw.w, basketDraw.h);
        ctx.restore();
        return;
      }
      ctx.save();
      ctx.translate(liftX, y);
      ctx.rotate(Math.sin(t * .006) * .025);

      ctx.strokeStyle = "#24120d";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(-30, -56);
      ctx.lineTo(-54, -160);
      ctx.moveTo(26, -56);
      ctx.lineTo(52, -160);
      ctx.stroke();

      ctx.fillStyle = "#bd6a2f";
      roundedRect(-42, -44, 84, 72, 8);
      ctx.fill();
      inkStroke(5);
      ctx.fillStyle = "#ffcf51";
      for (let i = -34; i <= 30; i += 16) {
        ctx.fillRect(i, -40, 8, 64);
      }

      drawPig(0, -70, state.basket.mood);

      ctx.fillStyle = "#e3342b";
      ctx.beginPath();
      ctx.ellipse(54, -22, 20, 14, -.25, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(4);
      ctx.restore();
    }

    function drawPig(x, y, grin) {
      ctx.save();
      ctx.translate(x, y);
      ctx.fillStyle = "#ff9db2";
      ctx.beginPath();
      ctx.ellipse(0, 0, 41, 35, 0, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(5);
      ctx.fillStyle = "#ff7f9c";
      ctx.beginPath();
      ctx.ellipse(-13, -30, 15, 24, -.55, 0, Math.PI * 2);
      ctx.ellipse(21, -28, 14, 23, .55, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(4);
      ctx.fillStyle = "#fff7d5";
      ctx.beginPath();
      ctx.arc(-14, -7, 11, 0, Math.PI * 2);
      ctx.arc(16, -7, 11, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(3);
      ctx.fillStyle = "#24120d";
      ctx.beginPath();
      ctx.arc(-11, -6, 4, 0, Math.PI * 2);
      ctx.arc(19, -8, 4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#ff6f91";
      ctx.beginPath();
      ctx.ellipse(3, 8, 18, 12, 0, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(3);
      ctx.fillStyle = "#24120d";
      ctx.beginPath();
      ctx.arc(-4, 8, 2.5, 0, Math.PI * 2);
      ctx.arc(10, 8, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(3, 19, 13 + grin * 12, .15, Math.PI - .15);
      ctx.strokeStyle = "#24120d";
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    function drawWolf(wolf) {
      if (wolf.hit) return;
      const bobY = Math.sin(wolf.bob) * 2;
      if (wolf.underwater && underwaterEnemyAsset.ready) {
        const part = atlas.underwater[wolf.kind] || atlas.underwater.fish;
        ctx.save();
        if (wolf.flash > 0) ctx.globalAlpha = .55 + Math.sin(performance.now() * .05) * .35;
        ctx.drawImage(underwaterEnemyAsset.img, part.x, part.y, part.w, part.h, wolf.x + enemyDraw.x, wolf.y + enemyDraw.y + bobY, enemyDraw.w, enemyDraw.h);
        ctx.restore();
        return;
      }
      if (spriteAsset.ready) {
        const part = wolf.kind === "wolf" ? atlas.wolves[wolf.sprite] || atlas.wolves[0] : atlas[wolf.kind] || atlas.wolves[0];
        ctx.save();
        if (wolf.flash > 0) ctx.globalAlpha = .55 + Math.sin(performance.now() * .05) * .35;
        ctx.drawImage(spriteAsset.img, part.x, part.y, part.w, part.h, wolf.x + enemyDraw.x, wolf.y + enemyDraw.y + bobY, enemyDraw.w, enemyDraw.h);
        ctx.restore();
        return;
      }
      ctx.save();
      ctx.translate(wolf.x, wolf.y);

      ctx.strokeStyle = "#24120d";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(0, -20 + bobY);
      ctx.lineTo(0, -52 + bobY);
      ctx.stroke();

      ctx.fillStyle = wolf.color;
      ctx.beginPath();
      ctx.ellipse(0, -82 + bobY, wolf.balloon * .88, wolf.balloon * 1.06, 0, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(5);
      ctx.fillStyle = "rgba(255,255,255,.72)";
      ctx.beginPath();
      ctx.ellipse(-13, -99 + bobY, 9, 14, -.65, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#716271";
      ctx.beginPath();
      ctx.moveTo(-34, -10);
      ctx.lineTo(-18, -44);
      ctx.lineTo(-3, -13);
      ctx.lineTo(18, -45);
      ctx.lineTo(34, -8);
      ctx.closePath();
      ctx.fill();
      inkStroke(5);
      ctx.fillStyle = "#8d7f8c";
      ctx.beginPath();
      ctx.ellipse(0, 0, 37, 31, 0, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(5);
      ctx.fillStyle = "#fff7d5";
      ctx.beginPath();
      ctx.arc(-13, -3, 9, 0, Math.PI * 2);
      ctx.arc(14, -4, 9, 0, Math.PI * 2);
      ctx.fill();
      inkStroke(3);
      ctx.fillStyle = "#24120d";
      ctx.beginPath();
      ctx.arc(-11, -2, 3.2, 0, Math.PI * 2);
      ctx.arc(12, -3, 3.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#35232a";
      ctx.beginPath();
      ctx.ellipse(1, 12, 13, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "#fff4bf";
      ctx.beginPath();
      ctx.moveTo(-10, 20);
      ctx.lineTo(-4, 28);
      ctx.lineTo(2, 20);
      ctx.lineTo(8, 28);
      ctx.lineTo(14, 20);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawArrow(arrow) {
      if (spriteAsset.ready) {
        const part = atlas.arrow;
        ctx.save();
        ctx.translate(arrow.x, arrow.y);
        ctx.rotate(arrow.angle || 0);
        ctx.drawImage(spriteAsset.img, part.x, part.y, part.w, part.h, arrowDraw.x, arrowDraw.y, arrowDraw.w, arrowDraw.h);
        ctx.restore();
        return;
      }
      ctx.save();
      ctx.translate(arrow.x, arrow.y);
      ctx.strokeStyle = "#24120d";
      ctx.lineWidth = 7;
      ctx.beginPath();
      ctx.moveTo(-36, 0);
      ctx.lineTo(28, 0);
      ctx.stroke();
      ctx.strokeStyle = "#fff4bf";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-34, 0);
      ctx.lineTo(24, 0);
      ctx.stroke();
      ctx.fillStyle = "#ed3f32";
      ctx.beginPath();
      ctx.moveTo(31, 0);
      ctx.lineTo(13, -10);
      ctx.lineTo(16, 0);
      ctx.lineTo(13, 10);
      ctx.closePath();
      ctx.fill();
      inkStroke(3);
      ctx.fillStyle = "#23b7c7";
      ctx.beginPath();
      ctx.moveTo(-36, 0);
      ctx.lineTo(-55, -10);
      ctx.lineTo(-48, 0);
      ctx.lineTo(-55, 10);
      ctx.closePath();
      ctx.fill();
      inkStroke(3);
      ctx.restore();
    }

    function drawPops() {
      for (const pop of state.pops) {
        const life = 1 - pop.age / pop.life;
        ctx.save();
        ctx.globalAlpha = life;
        ctx.translate(pop.x, pop.y);
        ctx.rotate(pop.age * 8);
        if (spriteAsset.ready) {
          const part = atlas.star;
          ctx.drawImage(spriteAsset.img, part.x, part.y, part.w, part.h, -pop.size, -pop.size, pop.size * 2, pop.size * 2);
          ctx.restore();
          continue;
        }
        ctx.fillStyle = pop.color;
        ctx.beginPath();
        for (let i = 0; i < 10; i += 1) {
          const r = i % 2 ? pop.size * .45 : pop.size;
          const a = i / 10 * Math.PI * 2;
          ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        }
        ctx.closePath();
        ctx.fill();
        inkStroke(2);
        ctx.restore();
      }
    }

    function drawLunchDrops() {
      for (const lunch of state.lunchDrops) {
        const life = 1 - lunch.age / lunch.life;
        ctx.save();
        ctx.globalAlpha = Math.min(1, life * 1.8);
        ctx.translate(lunch.x, lunch.y);
        ctx.rotate(lunch.rot);
        if (spriteAsset.ready) {
          const part = atlas.lunch;
          ctx.drawImage(spriteAsset.img, part.x, part.y, part.w, part.h, -lunch.size * .48, -lunch.size * .52, lunch.size, lunch.size * 1.08);
        } else {
          ctx.fillStyle = "#ed3f32";
          ctx.beginPath();
          ctx.arc(0, 0, lunch.size * .28, 0, Math.PI * 2);
          ctx.fill();
          inkStroke(3);
        }
        ctx.restore();
      }
    }

    function drawWaveBanner() {
      if (state.mode !== "play" || state.waveText <= 0) return;
      ctx.save();
      ctx.globalAlpha = Math.min(1, state.waveText * 1.6);
      ctx.textAlign = "center";
      ctx.fillStyle = "rgba(36, 18, 13, .72)";
      ctx.strokeStyle = "rgba(255, 244, 191, .78)";
      ctx.lineWidth = 2;
      roundedRect(176, 100, 188, 50, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#fff4bf";
      ctx.font = "900 22px sans-serif";
      ctx.fillText(`第 ${state.wave} 波`, 270, 132);
      ctx.restore();
    }

    function render(t = 0) {
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.setTransform(scale, 0, 0, scale, viewX, viewY);
      ctx.save();
      if (state.shake > 0) {
        ctx.translate((Math.random() - .5) * state.shake * 26, (Math.random() - .5) * state.shake * 20);
      }
      drawBackground(t);
      for (const wolf of state.wolves) drawWolf(wolf);
      for (const arrow of state.arrows) drawArrow(arrow);
      drawBasket(t);
      drawLunchDrops();
      drawPops();
      drawWaveBanner();
      if (state.flash > 0) {
        ctx.fillStyle = `rgba(255, 45, 34, ${state.flash * 1.55})`;
        ctx.fillRect(0, 0, W, H);
      }
      ctx.restore();
    }

    function loop(t) {
      const dt = Math.min(.034, (t - state.last) / 1000 || 0);
      state.last = t;
      if (state.mode === "play") update(dt);
      render(t);
      requestAnimationFrame(loop);
    }

    function updateJoystick(event) {
      const joystick = document.getElementById("joystick");
      const rect = joystick.getBoundingClientRect();
      const centerY = rect.top + rect.height * .55;
      const dy = event.clientY - centerY;
      keys.up = dy < -8;
      keys.down = dy > 8;
      joystick.classList.toggle("is-up", keys.up);
      joystick.classList.toggle("is-down", keys.down);
    }

    function releaseJoystick() {
      const joystick = document.getElementById("joystick");
      keys.up = false;
      keys.down = false;
      joystick.classList.remove("is-up", "is-down");
    }

    function bindJoystick(el) {
      el.addEventListener("pointerdown", (event) => {
        event.preventDefault();
        el.setPointerCapture?.(event.pointerId);
        updateJoystick(event);
      });
      el.addEventListener("pointermove", (event) => {
        if (!el.hasPointerCapture?.(event.pointerId)) return;
        event.preventDefault();
        updateJoystick(event);
      });
      el.addEventListener("pointerup", (event) => {
        event.preventDefault();
        el.releasePointerCapture?.(event.pointerId);
        releaseJoystick();
      });
      el.addEventListener("pointercancel", releaseJoystick);
      el.addEventListener("lostpointercapture", releaseJoystick);
    }

    function bindShoot(el) {
      const on = (event) => {
        event.preventDefault();
        el.setPointerCapture?.(event.pointerId);
        keys.shoot = true;
        shoot();
      };
      const off = (event) => {
        event.preventDefault();
        el.releasePointerCapture?.(event.pointerId);
        keys.shoot = false;
      };
      el.addEventListener("pointerdown", on);
      el.addEventListener("pointerup", off);
      el.addEventListener("pointerleave", off);
      el.addEventListener("pointercancel", off);
    }

    document.querySelectorAll("[data-start]").forEach((button) => button.addEventListener("click", (event) => {
      event.currentTarget.blur();
      reset();
    }));
    splash.addEventListener("click", hideSplash);
    splash.addEventListener("pointerdown", hideSplash);
    bindJoystick(document.getElementById("joystick"));
    bindShoot(document.getElementById("shoot"));

    window.addEventListener("keydown", (event) => {
      if (["ArrowUp", "ArrowDown", "KeyW", "KeyS", "Space", "Enter"].includes(event.code)) event.preventDefault();
      if (event.code === "ArrowUp" || event.code === "KeyW") keys.up = true;
      if (event.code === "ArrowDown" || event.code === "KeyS") keys.down = true;
      if (event.code === "Space" || event.code === "Enter") {
        if (!keys.shoot) shoot();
        keys.shoot = true;
      }
      if (event.code === "KeyP" && state.mode === "play") setMode("paused");
      else if (event.code === "KeyP" && state.mode === "paused") setMode("play");
    });

    window.addEventListener("keyup", (event) => {
      if (event.code === "ArrowUp" || event.code === "KeyW") keys.up = false;
      if (event.code === "ArrowDown" || event.code === "KeyS") keys.down = false;
      if (event.code === "Space" || event.code === "Enter") keys.shoot = false;
    });

    window.addEventListener("resize", fit);
    fit();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
